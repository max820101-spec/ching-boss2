<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://truth.bahamut.com.tw/s01/201505/22b2f46bec04d577228de14135d022c6.JPG");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
max-width:1200px;
margin:auto;
padding:15px;
}

/* LOGO */

.logo{
width:460px;
max-width:95%;
height:auto;
filter: drop-shadow(0 0 18px rgba(0,200,255,0.8));
}

/* 輸入 */

textarea{
width:100%;
padding:10px;
border-radius:8px;
margin-top:5px;
}

/* 按鈕 */

button{
border:none;
border-radius:8px;
padding:6px 12px;
margin:3px;
cursor:pointer;
font-weight:bold;
font-size:13px;
transition:0.15s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

.btnKill{background:#ffb97a;color:#4a2a00}
.btnRob{background:#ff9a9a;color:#4a0000}
.btnStar{background:#ffe08a;color:#333}
.btnDel{background:#cfcfcf;color:#333}

/* 左右欄 */

.container{
display:flex;
gap:20px;
}

.column{
flex:1;
}

/* 卡片 */

.card{
background:rgba(0,60,90,0.78);
padding:12px 14px;
margin:8px 0;
border-radius:12px;
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

/* 頻道大字 */

.channel{
font-size:22px;
font-weight:bold;
}

/* 排名色 */

.rank1{background:#ff5a5a}
.rank2{background:#b06ad6}
.rank3{background:#5aa2ff}
.rank4{background:#57c96f}
.rank5{background:#ffe36a;color:#000}

.star{
font-size:20px;
}

/* 手機 */

@media (max-width:700px){

.container{
flex-direction:column;
}

.logo{
width:320px;
}

}

</style>
</head>

<body>

<center>
<img src="./12454.png" class="logo">
<h2>檠檠BOSS團隊</h2>
</center>

<div id="clock"></div>

<textarea id="input"></textarea>

<button onclick="submit()">送出</button>
<button onclick="copyConfirmed()">複製已確認</button>
<button onclick="copyNeed()">複製未確認</button>
<button onclick="reset()">Reset</button>

<h3 id="count"></h3>

<div class="container">

<div class="column">

<h3>已確認</h3>
<div id="confirmed"></div>

</div>

<div class="column">

<h3>未確認</h3>
<div id="need"></div>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyA...",
authDomain:"boss02-5f871.firebaseapp.com",
projectId:"boss02-5f871",
storageBucket:"boss02-5f871.firebasestorage.app",
messagingSenderId:"437580339649",
appId:"1:437580339649:web:3a3a47c0d886408574f740"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

const confirmedDiv=document.getElementById("confirmed")
const needDiv=document.getElementById("need")

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}))
}

function fmt(t){
return t.toTimeString().slice(0,5)
}

setInterval(()=>{
clock.innerText="台灣時間 "+fmt(nowTW())
},1000)

document.getElementById("input").addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
submit()
}
})

function submit(){

let raw=input.value.trim()
let arr=raw.split(/\s+/)

for(let i=0;i<arr.length;i+=2){

let ch=arr[i]
let arg=arr[i+1]

if(!ch||!arg)continue

if(arg==="K"){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"kill",time:nowTW().getTime()})
continue
}

if(arg==="R"){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"rob",time:nowTW().getTime()})
continue
}

let t

if(arg.length===4){

let h=parseInt(arg.slice(0,2))
let m=parseInt(arg.slice(2))

let d=nowTW()
d.setHours(h)
d.setMinutes(m)

t=d.getTime()

}else{

t=nowTW().getTime()+parseInt(arg)*60000

}

db.collection("bosses").doc(ch).set({ch,type:"confirmed",time:t,star:0})

}

input.value=""
}

function markKill(ch){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"kill",time:nowTW().getTime()})
}

function markRob(ch){
db.collection("bosses").doc(ch).set({ch,type:"need",status:"rob",time:nowTW().getTime()})
}

function remove(ch){
db.collection("bosses").doc(ch).delete()
}

function setStar(ch,n){
let next=(n+1)%6
db.collection("bosses").doc(ch).update({star:next})
}

function starIcon(n){
return ["","⭐","🟢","🔵","🟣","🔴"][n]
}

function copyConfirmed(){

let txt=""

document.querySelectorAll("#confirmed .card").forEach(c=>{
let ch=c.querySelector(".channel").innerText
let time=c.innerText.match(/\d{2}:\d{2}/)
if(time)txt+=ch+" "+time[0]+"\n"
})

navigator.clipboard.writeText(txt)

}

function copyNeed(){

let txt=""

document.querySelectorAll("#need .card").forEach(c=>{
let ch=c.querySelector(".channel").innerText
txt+=ch+"\n"
})

navigator.clipboard.writeText(txt)

}

async function reset(){

if(!confirm("確定清空?"))return

let s=await db.collection("bosses").get()

s.forEach(d=>d.ref.delete())

}

db.collection("bosses").onSnapshot(s=>{

let confirmed=[]
let need=[]

s.forEach(doc=>{
let d=doc.data()

if(d.type==="confirmed")confirmed.push(d)
else need.push(d)
})

confirmed.sort((a,b)=>a.time-b.time)
need.sort((a,b)=>b.time-a.time)

confirmedDiv.innerHTML=""
needDiv.innerHTML=""

count.innerText="目前頻道數："+confirmed.length

confirmed.forEach((d,i)=>{

let cls=""
if(i===0)cls="rank1"
else if(i===1)cls="rank2"
else if(i===2)cls="rank3"
else if(i===3)cls="rank4"
else if(i===4)cls="rank5"

let diff=Math.floor((d.time-nowTW().getTime())/60000)

let text=fmt(new Date(d.time))

if(diff<=-1)text+=" (遲)"
else if(diff===0)text+=" ⚔️重生"
else if(diff<=5)text+=" 剩"+diff+"分"

confirmedDiv.innerHTML+=`

<div class="card ${cls}">

<button class="btnDel" onclick="remove('${d.ch}')">❌</button>

<button class="btnStar" onclick="setStar('${d.ch}',${d.star||0})">⭐標記</button>

<span class="channel">${starIcon(d.star||0)} ${d.ch}</span>

${text}

<button class="btnKill" onclick="markKill('${d.ch}')">🔥擊殺</button>

<button class="btnRob" onclick="markRob('${d.ch}')">⚠️被搶</button>

</div>
`
})

need.forEach(d=>{

let label=d.status==="rob"?"⚠️被搶":"🔥擊殺"

needDiv.innerHTML+=`

<div class="card">

<button class="btnDel" onclick="remove('${d.ch}')">❌</button>

<span class="channel">${d.ch}</span>

${label}

</div>
`
})

})

</script>

</body>
</html>
