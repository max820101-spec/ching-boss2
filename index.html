<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>檠檠BOSS團隊 V2</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url("https://truth.bahamut.com.tw/s01/201505/22b2f46bec04d577228de14135d022c6.JPG");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#e8f6ff;
max-width:1200px;
margin:auto;
padding:15px;
}

.logo{
width:500px;
max-width:95%;
filter: drop-shadow(0 0 20px rgba(0,200,255,0.9));
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
margin-top:5px;
background:rgba(0,40,70,0.6);
color:#fff;
}

button{
border:none;
border-radius:8px;
padding:6px 12px;
margin:3px;
cursor:pointer;
font-weight:bold;
}

.btnKill{background:#ffb97a;color:#4a2a00}
.btnRob{background:#ff9a9a;color:#4a0000}
.btnStar{background:#ffe08a;color:#333}
.btnDel{background:#cfcfcf;color:#333}

.container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.column{
flex:1;
min-width:280px;
}

.card{
background:rgba(0,60,90,0.8);
padding:12px;
margin:8px 0;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

.channel{
font-size:26px;
font-weight:900;
}

.time{
font-size:16px;
opacity:0.9;
}

.rank1{background:#ff6b6b}
.rank2{background:#c77dff}
.rank3{background:#74c0fc}
.rank4{background:#69db7c}
.rank5{background:#ffd43b;color:#000}

</style>
</head>

<body>

<center>
<img src="./12454.png" class="logo">
<h2>檠檠BOSS團隊 V2</h2>
</center>

<div id="clock"></div>

<textarea id="input"></textarea>

<button onclick="submit()">送出</button>
<button onclick="copyConfirmed()">複製已確認</button>
<button onclick="copyNeed()">複製未確認</button>
<button onclick="reset()">Reset</button>

<h3 id="count"></h3>

<div class="container">

<div class="column">
<h3>已確認</h3>
<div id="confirmed"></div>
</div>

<div class="column">
<h3>未確認</h3>
<div id="need"></div>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"👉換成你Firebase完整key",
authDomain:"boss02-5f871.firebaseapp.com",
projectId:"boss02-5f871",
storageBucket:"boss02-5f871.firebasestorage.app",
messagingSenderId:"437580339649",
appId:"1:437580339649:web:3a3a47c0d886408574f740"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

const confirmedDiv=document.getElementById("confirmed")
const needDiv=document.getElementById("need")

function nowTW(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"}))
}

function fmt(t){
return t.toTimeString().slice(0,5)
}

setInterval(()=>{
document.getElementById("clock").innerText="台灣時間 "+fmt(nowTW())
},1000)

document.getElementById("input").addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
submit()
}
})

function submit(){

let raw=document.getElementById("input").value.trim()
let arr=raw.split(/\s+/)

for(let i=0;i<arr.length;i+=2){

let ch=arr[i]
let arg=arr[i+1]

if(!ch||!arg)continue

if(arg==="K"){
db.collection("bosses").doc(ch).set({
ch:ch,type:"need",status:"kill",time:nowTW().getTime()
},{merge:true})
continue
}

if(arg==="R"){
db.collection("bosses").doc(ch).set({
ch:ch,type:"need",status:"rob",time:nowTW().getTime()
},{merge:true})
continue
}

let t

if(arg.length===4){

let h=parseInt(arg.slice(0,2))
let m=parseInt(arg.slice(2))

let d=nowTW()
d.setHours(h)
d.setMinutes(m)

t=d.getTime()

}else{

t=nowTW().getTime()+parseInt(arg)*60000

}

db.collection("bosses").doc(ch).set({
ch:ch,type:"confirmed",time:t
},{merge:true})

}

document.getElementById("input").value=""
}

function markKill(ch){
db.collection("bosses").doc(ch).set({
ch:ch,type:"need",status:"kill",time:nowTW().getTime()
},{merge:true})
}

function markRob(ch){
db.collection("bosses").doc(ch).set({
ch:ch,type:"need",status:"rob",time:nowTW().getTime()
},{merge:true})
}

function remove(ch){
db.collection("bosses").doc(ch).delete()
}

function setStar(ch,n){
let next=(n+1)%6
db.collection("bosses").doc(ch).set({star:next},{merge:true})
}

function starIcon(n){
return ["","⭐","🟢","🔵","🟣","🔴"][n]
}

function copyConfirmed(){
let txt=""
document.querySelectorAll("#confirmed .card").forEach(c=>{
let ch=c.querySelector(".channel").innerText
let time=c.querySelector(".time").innerText
txt+=ch+" "+time+"\n"
})
navigator.clipboard.writeText(txt)
}

function copyNeed(){
let txt=""
document.querySelectorAll("#need .card").forEach(c=>{
let ch=c.querySelector(".channel").innerText
txt+=ch+"\n"
})
navigator.clipboard.writeText(txt)
}

async function reset(){
if(!confirm("確定清空?"))return
let s=await db.collection("bosses").get()
s.forEach(d=>d.ref.delete())
}

db.collection("bosses").onSnapshot(s=>{

let confirmed=[]
let need=[]

s.forEach(doc=>{
let d=doc.data()

// 防炸
if(!d || !d.ch || !d.type) return

if(d.type==="confirmed")confirmed.push(d)
if(d.type==="need")need.push(d)
})

confirmed.sort((a,b)=>a.time-b.time)

confirmedDiv.innerHTML=""
needDiv.innerHTML=""

document.getElementById("count").innerText="目前頻道數："+confirmed.length

confirmed.forEach((d,i)=>{

let rank=""
if(i===0)rank="rank1"
else if(i===1)rank="rank2"
else if(i===2)rank="rank3"
else if(i===3)rank="rank4"
else if(i===4)rank="rank5"

let diff=Math.floor((d.time-nowTW().getTime())/60000)
let text=fmt(new Date(d.time))

if(diff<=-1)text+=" (遲)"
else if(diff===0)text+=" ⚔️重生"
else if(diff<=5)text+=" 剩"+diff+"分"

confirmedDiv.innerHTML+=`
<div class="card ${rank}">
<button class="btnDel" onclick="remove('${d.ch}')">❌</button>
<button class="btnStar" onclick="setStar('${d.ch}',${d.star||0})">⭐</button>
<span class="channel">${starIcon(d.star||0)} ${d.ch}</span>
<span class="time">${text}</span>
<button class="btnKill" onclick="markKill('${d.ch}')">🔥擊殺</button>
<button class="btnRob" onclick="markRob('${d.ch}')">⚠️被搶</button>
</div>`
})

need.forEach(d=>{

let label=d.status==="rob"?"⚠️被搶":"🔥擊殺"

needDiv.innerHTML+=`
<div class="card">
<button class="btnDel" onclick="remove('${d.ch}')">❌</button>
<span class="channel">${starIcon(d.star||0)} ${d.ch}</span>
${label}
</div>`
})

})

</script>

</body>
</html>
